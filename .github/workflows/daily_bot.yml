name: Run My Bot

on:
  schedule:
    - cron: '0 0 */5 * *'  # Every 5 days midnight ki run avthundi
  workflow_dispatch:      # Manual ga run cheyadaniki button logic

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Code techuko (Latest version v4 use cheyadam better)
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Python Install cheyyi
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # Step 3: Libraries Install cheyyi
      - name: Install Libraries
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Step 4: Secret nunchi credentials file create cheyyi
      - name: Create JSON Key File
        run: echo '${{ secrets.GCP_JSON_CONTENT }}' > credentials.json

      # Step 5: Script Run cheyyi
      - name: Run Automation Script
        env:
          LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
        run: python main1.py
